{% extends "base.html" %}
{% block title %}{{ asset.symbol }} — NTEXECG{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto space-y-4">
    <a href="/ui/assets" class="text-blue-400 hover:text-blue-300 text-sm">← Volver a activos</a>
    <h1 class="text-xl font-bold text-white">{{ asset.symbol }} <span class="text-gray-500 text-base font-normal">{{ asset.name }}</span></h1>

    <div class="bg-gray-900 border border-gray-800 rounded p-4 text-sm space-y-2">
        <div><span class="text-gray-500">Pine Script:</span> <code class="text-sky-300 font-mono">{{ asset.pine_script_config }}</code></div>
        <div><span class="text-gray-500">Sesión:</span> <span class="text-gray-300">{{ session }}</span></div>
        <div><span class="text-gray-500">Tipo:</span> <span class="text-gray-300">{{ asset.contract_type }}</span></div>
    </div>

    <form method="post" action="/ui/assets/{{ asset.symbol }}" class="bg-gray-900 border border-gray-800 rounded p-4 space-y-3 text-sm">
        <legend class="text-xs uppercase tracking-wider text-gray-500 mb-1">Editar parámetros</legend>
        <div class="grid grid-cols-3 gap-3">
            <div>
                <label class="block text-xs text-gray-400 mb-1">SL ATR mult</label>
                <input name="sl_atr_multiplier" type="number" step="0.1" value="{{ asset.sl_atr_multiplier or '' }}"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-gray-100">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">Score mín</label>
                <input name="score_minimum" type="number" value="{{ asset.score_minimum or '' }}"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-gray-100">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">ATR period</label>
                <input name="atr_period" type="number" value="{{ asset.atr_period or '' }}"
                       class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1 text-gray-100">
            </div>
        </div>
        <button type="submit" class="bg-green-700 hover:bg-green-600 text-white px-4 py-2 rounded">Guardar</button>
    </form>
</div>
{% endblock %}
